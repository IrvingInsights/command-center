<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Irving Insights | Content Pipeline</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #2a2a2a;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 30px 20px;
        }

        header {
            max-width: 900px;
            margin: 0 auto 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        h1 { font-size: 20px; font-weight: 400; color: #e0e0e0; letter-spacing: 0.5px; }

        .back-link { font-size: 13px; color: #00d9ff; text-decoration: none; opacity: 0.8; }
        .back-link:hover { opacity: 1; }

        /* ---- Cards ---- */
        .card {
            max-width: 900px;
            margin: 0 auto 20px;
            background: #1e1e1e;
            border: 2px solid #00d9ff;
            border-radius: 10px;
            padding: 26px 30px;
            box-shadow: 0 0 20px rgba(0,217,255,0.12);
        }

        .card-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #00d9ff;
            margin-bottom: 20px;
        }

        /* ---- Form ---- */
        .field { margin-bottom: 18px; }

        label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.7px;
            margin-bottom: 6px;
        }

        input[type="text"], select, textarea {
            width: 100%;
            background: #111;
            border: 1.5px solid #3a3a3a;
            border-radius: 6px;
            color: #e0e0e0;
            font-family: inherit;
            font-size: 14px;
            padding: 10px 13px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input[type="text"]:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #00d9ff;
            box-shadow: 0 0 10px rgba(0,217,255,0.2);
        }
        textarea { min-height: 72px; resize: vertical; }
        select { cursor: pointer; }
        select option { background: #1e1e1e; }

        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

        /* ---- Buttons ---- */
        .btn-row { display: flex; gap: 10px; margin-top: 22px; flex-wrap: wrap; align-items: center; }

        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            letter-spacing: 0.3px;
            transition: all 0.15s;
        }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn:active:not(:disabled) { transform: scale(0.97); }

        .btn-primary { background: #00d9ff; color: #111; }
        .btn-primary:hover:not(:disabled) { background: #00c4e8; box-shadow: 0 0 12px rgba(0,217,255,0.45); }

        .btn-secondary { background: transparent; color: #00d9ff; border: 1.5px solid #00d9ff; }
        .btn-secondary:hover:not(:disabled) { background: rgba(0,217,255,0.08); }

        .btn-danger { background: transparent; color: #ff6b6b; border: 1.5px solid #ff6b6b; }
        .btn-danger:hover:not(:disabled) { background: rgba(255,107,107,0.08); }

        /* ---- Status badge ---- */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            font-size: 12px;
            font-weight: 500;
            padding: 5px 12px;
            border-radius: 20px;
            margin-left: auto;
        }
        .status-badge.idle    { background: #2a2a2a; color: #666; border: 1px solid #444; }
        .status-badge.running { background: rgba(0,217,255,0.12); color: #00d9ff; border: 1px solid #00d9ff; }
        .status-badge.done    { background: rgba(0,200,100,0.12); color: #4cdb85; border: 1px solid #4cdb85; }
        .status-badge.error   { background: rgba(255,107,107,0.12); color: #ff6b6b; border: 1px solid #ff6b6b; }

        .dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: currentColor;
        }
        .dot.pulse { animation: pulse 1s infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* ---- Stage progress ---- */
        .stages {
            display: flex;
            gap: 6px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }
        .stage-chip {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            border: 1px solid #333;
            color: #555;
            background: #1a1a1a;
            transition: all 0.3s;
        }
        .stage-chip.active {
            border-color: #00d9ff;
            color: #00d9ff;
            background: rgba(0,217,255,0.08);
        }
        .stage-chip.complete {
            border-color: #4cdb85;
            color: #4cdb85;
            background: rgba(76,219,133,0.08);
        }

        /* ---- Output stream ---- */
        #output-card { display: none; }

        #output-box {
            background: #0d0d0d;
            border: 1.5px solid #2a2a2a;
            border-radius: 6px;
            padding: 18px 20px;
            font-size: 13.5px;
            line-height: 1.75;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 600px;
            overflow-y: auto;
            color: #c8c8c8;
            font-family: 'Georgia', serif;
        }
        #output-box::-webkit-scrollbar { width: 5px; }
        #output-box::-webkit-scrollbar-track { background: #111; }
        #output-box::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: #00d9ff;
            margin-left: 1px;
            vertical-align: text-bottom;
            animation: blink 0.9s step-end infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* ---- File saved notice ---- */
        #saved-notice {
            display: none;
            margin-top: 12px;
            font-size: 12px;
            color: #4cdb85;
        }

        /* ---- Copy badge ---- */
        .copy-badge {
            font-size: 11px;
            font-weight: 700;
            color: #00d9ff;
            opacity: 0;
            transition: opacity 0.3s;
            margin-left: 4px;
        }
        .copy-badge.show { opacity: 1; }

        /* ---- History ---- */
        #history-card { display: none; }

        .history-list { list-style: none; }
        .history-list li {
            padding: 9px 12px;
            border-bottom: 1px solid #252525;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
        }
        .history-list li:last-child { border-bottom: none; }
        .history-meta { color: #555; font-size: 11px; min-width: 130px; text-align: right; }
        .history-title { flex: 1; }
        .btn-sm {
            padding: 4px 10px;
            font-size: 11px;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid #00d9ff;
            background: transparent;
            color: #00d9ff;
        }
        .btn-sm:hover { background: rgba(0,217,255,0.1); }

        /* ---- Server status pill ---- */
        #server-pill {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 16px;
        }
        #server-pill.online  { background: rgba(76,219,133,0.12); color: #4cdb85; border: 1px solid #4cdb85; }
        #server-pill.offline { background: rgba(255,107,107,0.12); color: #ff6b6b; border: 1px solid #ff6b6b; }
    </style>
</head>
<body>

<header>
    <h1>✍️ Content Pipeline</h1>
    <a class="back-link" href="index.html">← Command Center</a>
</header>

<!-- INPUT FORM -->
<div class="card">
    <div class="card-title">Content Item</div>

    <div id="server-pill" class="offline">
        <span class="dot"></span> <span id="server-pill-text">Checking server…</span>
    </div>

    <form id="pipeline-form">
        <div class="field">
            <label for="title">Title / Idea</label>
            <input type="text" id="title" placeholder="Paste from Notion content calendar…" required>
        </div>

        <div class="row-2">
            <div class="field">
                <label for="platform">Platform</label>
                <select id="platform">
                    <option>LinkedIn</option>
                    <option>Substack</option>
                    <option>X</option>
                    <option>YouTube</option>
                </select>
            </div>
            <div class="field">
                <label for="domain">Domain</label>
                <select id="domain">
                    <option>Irving Insights</option>
                    <option>Book</option>
                    <option>TBK</option>
                    <option>SubSignal</option>
                    <option>Personal</option>
                </select>
            </div>
        </div>

        <div class="field">
            <label for="notes">Notes</label>
            <textarea id="notes" placeholder="Paste any notes from Notion entry, or leave blank…"></textarea>
        </div>

        <div class="btn-row">
            <button type="submit" class="btn btn-primary" id="run-btn">Run Pipeline</button>
            <button type="button" class="btn btn-danger" id="stop-btn" style="display:none">Stop</button>
            <span class="status-badge idle" id="status-badge">
                <span class="dot"></span> Ready
            </span>
        </div>
    </form>
</div>

<!-- OUTPUT -->
<div class="card" id="output-card">
    <div class="card-title" style="display:flex; align-items:center; justify-content:space-between;">
        <span>Output</span>
        <div style="display:flex; gap:8px; align-items:center;">
            <button class="btn btn-secondary" id="copy-btn" style="padding:5px 14px; font-size:12px;">
                Copy <span class="copy-badge" id="copy-badge">✓ Copied</span>
            </button>
        </div>
    </div>

    <div class="stages">
        <div class="stage-chip" id="chip-1">① Research</div>
        <div class="stage-chip" id="chip-2">② Draft</div>
        <div class="stage-chip" id="chip-3">③ Editorial</div>
        <div class="stage-chip" id="chip-4">④ Posting</div>
    </div>

    <div id="output-box"></div>
    <div id="saved-notice"></div>
</div>

<!-- HISTORY -->
<div class="card" id="history-card">
    <div class="card-title">Recent Runs</div>
    <ul class="history-list" id="history-list"></ul>
</div>

<script>
// -----------------------------------------------------------------------
// Server health check
// -----------------------------------------------------------------------
const SERVER = window.location.origin; // same host:port as Flask

async function checkServer() {
    const pill = document.getElementById('server-pill');
    const text = document.getElementById('server-pill-text');
    try {
        const res = await fetch(SERVER + '/health', { method: 'GET', cache: 'no-store' });
        if (res.ok) {
            pill.className = 'online';
            text.textContent = 'Server online — API connected';
            return true;
        }
    } catch {}
    pill.className = 'offline';
    text.textContent = 'Server offline — run: python pipeline_server.py';
    return false;
}
checkServer();

// -----------------------------------------------------------------------
// Stage detection from streamed text
// -----------------------------------------------------------------------
const STAGE_MARKERS = [
    { chip: 'chip-1', pattern: /research complete\./i },
    { chip: 'chip-2', pattern: /draft complete\./i },
    { chip: 'chip-3', pattern: /final copy ready\./i },
    { chip: 'chip-4', pattern: /session complete\./i },
];

let stagesComplete = 0;

function updateStages(text) {
    for (let i = stagesComplete; i < STAGE_MARKERS.length; i++) {
        if (STAGE_MARKERS[i].pattern.test(text)) {
            // mark all up to i as complete, i+1 as active
            for (let j = 0; j <= i; j++) {
                document.getElementById(STAGE_MARKERS[j].chip).className = 'stage-chip complete';
            }
            if (i + 1 < STAGE_MARKERS.length) {
                document.getElementById(STAGE_MARKERS[i + 1].chip).className = 'stage-chip active';
            }
            stagesComplete = i + 1;
        }
    }
}

// -----------------------------------------------------------------------
// Run pipeline
// -----------------------------------------------------------------------
let currentReader = null;
let fullOutput = '';

function setStatus(state, label) {
    const badge = document.getElementById('status-badge');
    badge.className = 'status-badge ' + state;
    const dot = badge.querySelector('.dot');
    dot.className = 'dot' + (state === 'running' ? ' pulse' : '');
    badge.innerHTML = `<span class="dot${state === 'running' ? ' pulse' : ''}"></span> ${label}`;
}

document.getElementById('pipeline-form').addEventListener('submit', async function(e) {
    e.preventDefault();

    const online = await checkServer();
    if (!online) {
        alert('Pipeline server is not running.\n\nStart it with:\n  python pipeline_server.py');
        return;
    }

    const title    = document.getElementById('title').value.trim();
    const platform = document.getElementById('platform').value;
    const domain   = document.getElementById('domain').value;
    const notes    = document.getElementById('notes').value;

    // Reset UI
    fullOutput = '';
    stagesComplete = 0;
    document.querySelectorAll('.stage-chip').forEach(c => c.className = 'stage-chip');
    document.getElementById('chip-1').className = 'stage-chip active';
    document.getElementById('output-box').textContent = '';
    document.getElementById('saved-notice').style.display = 'none';
    document.getElementById('output-card').style.display = 'block';
    document.getElementById('output-card').scrollIntoView({ behavior: 'smooth' });

    setStatus('running', 'Running…');
    document.getElementById('run-btn').disabled = true;
    document.getElementById('stop-btn').style.display = 'inline-block';

    // Cursor
    const outputBox = document.getElementById('output-box');
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    outputBox.appendChild(cursor);

    try {
        const res = await fetch(SERVER + '/run', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title, platform, domain, notes }),
        });

        currentReader = res.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';

        while (true) {
            const { value, done } = await currentReader.read();
            if (done) break;

            buf += decoder.decode(value, { stream: true });
            const lines = buf.split('\n');
            buf = lines.pop(); // keep incomplete line

            for (const line of lines) {
                if (!line.startsWith('data: ')) continue;
                let msg;
                try { msg = JSON.parse(line.slice(6)); } catch { continue; }

                if (msg.type === 'token') {
                    fullOutput += msg.text;
                    // Insert text before cursor
                    cursor.insertAdjacentText('beforebegin', msg.text);
                    // Auto-scroll
                    outputBox.scrollTop = outputBox.scrollHeight;
                    // Check stage markers
                    updateStages(fullOutput);

                } else if (msg.type === 'done') {
                    cursor.remove();
                    setStatus('done', 'Complete');
                    document.getElementById('run-btn').disabled = false;
                    document.getElementById('stop-btn').style.display = 'none';
                    // Mark all stages complete
                    document.querySelectorAll('.stage-chip').forEach(c => c.className = 'stage-chip complete');
                    // Show saved file
                    const notice = document.getElementById('saved-notice');
                    notice.textContent = `Saved → ${msg.file}`;
                    notice.style.display = 'block';
                    // Save history
                    saveHistory({ title, platform, domain, notes, date: todayLabel() });
                    renderHistory();

                } else if (msg.type === 'error') {
                    cursor.remove();
                    setStatus('error', 'Error');
                    outputBox.textContent += '\n\n⚠ ' + msg.message;
                    document.getElementById('run-btn').disabled = false;
                    document.getElementById('stop-btn').style.display = 'none';
                }
            }
        }
    } catch (err) {
        cursor.remove();
        if (err.name !== 'AbortError') {
            setStatus('error', 'Connection lost');
            outputBox.textContent += '\n\nConnection lost. Is the server still running?';
        }
        document.getElementById('run-btn').disabled = false;
        document.getElementById('stop-btn').style.display = 'none';
    }
});

// Stop button
document.getElementById('stop-btn').addEventListener('click', () => {
    if (currentReader) { currentReader.cancel(); currentReader = null; }
    setStatus('idle', 'Stopped');
    document.getElementById('run-btn').disabled = false;
    document.getElementById('stop-btn').style.display = 'none';
    document.querySelector('.cursor')?.remove();
});

// Copy button
document.getElementById('copy-btn').addEventListener('click', async () => {
    if (!fullOutput) return;
    try {
        await navigator.clipboard.writeText(fullOutput);
        const badge = document.getElementById('copy-badge');
        badge.classList.add('show');
        setTimeout(() => badge.classList.remove('show'), 2000);
    } catch {
        const range = document.createRange();
        range.selectNodeContents(document.getElementById('output-box'));
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
    }
});

// -----------------------------------------------------------------------
// History
// -----------------------------------------------------------------------
const HISTORY_KEY = 'pipeline_history';
function loadHistory() { try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch { return []; } }
function saveHistory(entry) {
    const h = loadHistory();
    h.unshift(entry);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(h.slice(0, 20)));
}
function todayLabel() {
    return new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderHistory() {
    const history = loadHistory();
    const card = document.getElementById('history-card');
    const list = document.getElementById('history-list');
    if (!history.length) { card.style.display = 'none'; return; }
    card.style.display = 'block';
    list.innerHTML = '';
    history.forEach((entry, idx) => {
        const li = document.createElement('li');
        li.innerHTML = `
            <span class="history-title">${escHtml(entry.title)}</span>
            <span class="history-meta">${escHtml(entry.platform)} · ${escHtml(entry.date)}</span>
            <button class="btn-sm" data-idx="${idx}">Load</button>`;
        list.appendChild(li);
    });
    list.querySelectorAll('.btn-sm').forEach(btn => {
        btn.addEventListener('click', () => {
            const e = history[+btn.dataset.idx];
            document.getElementById('title').value = e.title;
            document.getElementById('platform').value = e.platform;
            document.getElementById('domain').value = e.domain;
            document.getElementById('notes').value = e.notes;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    });
}

renderHistory();
</script>
</body>
</html>
